<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1971c2" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#5f3dc4" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2f9e44" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c92a2a" />
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#e67700" />
    </marker>
  </defs>

  <!-- Device Plugin -->
  <rect x="620" y="180" width="180" height="120" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
  <text x="710" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1971c2">Device Plugin</text>

  <!-- Kubelet -->
  <rect x="320" y="180" width="180" height="120" rx="8" fill="#d0bfff" stroke="#5f3dc4" stroke-width="2"/>
  <text x="410" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#5f3dc4">Kubelet</text>

  <!-- API Server -->
  <rect x="20" y="180" width="180" height="120" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
  <text x="110" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2f9e44">API Server</text>

  <!-- Scheduler -->
  <rect x="20" y="400" width="180" height="100" rx="8" fill="#ffc9c9" stroke="#c92a2a" stroke-width="2"/>
  <text x="110" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#c92a2a">Scheduler</text>

  <!-- GPU Hardware -->
  <rect x="620" y="400" width="180" height="80" rx="8" fill="#ffe066" stroke="#e67700" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="710" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#e67700">GPU Hardware</text>

  <!-- Arrow 1: Device Plugin -> Kubelet (Register) -->
  <line x1="620" y1="210" x2="505" y2="210" stroke="#1971c2" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <text x="560" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1971c2">1. Register</text>

  <!-- Arrow 2: Kubelet -> Device Plugin (List Devices) -->
  <line x1="500" y1="240" x2="615" y2="240" stroke="#5f3dc4" stroke-width="2" marker-end="url(#arrowhead-purple)"/>
  <text x="560" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5f3dc4">2. List Devices</text>

  <!-- Arrow 3: Device Plugin -> Kubelet (Report GPUs) -->
  <line x1="620" y1="270" x2="505" y2="270" stroke="#1971c2" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <text x="560" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1971c2">3. Report GPUs</text>

  <!-- Arrow 4: Kubelet -> API Server (Advertise) -->
  <line x1="320" y1="250" x2="205" y2="250" stroke="#2f9e44" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="262" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2f9e44">4. Advertise</text>

  <!-- Resource Label -->
  <text x="110" y="275" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#2f9e44" font-weight="bold">nvidia.com/gpu: 4</text>

  <!-- Arrow 5: API Server -> Scheduler (Read) -->
  <line x1="110" y1="300" x2="110" y2="395" stroke="#c92a2a" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <text x="130" y="350" font-family="Arial, sans-serif" font-size="14" fill="#c92a2a">5. Read</text>

  <!-- Arrow GPU: GPU Hardware -> Device Plugin (Discovers) -->
  <line x1="710" y1="400" x2="710" y2="305" stroke="#e67700" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-orange)"/>
  <text x="730" y="355" font-family="Arial, sans-serif" font-size="14" fill="#e67700">Discovers</text>

  <!-- Title -->
  <text x="410" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333">Device Plugin Registration Flow</text>

  <!-- Subtitle -->
  <text x="410" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">gRPC communication makes GPUs schedulable</text>

  <!-- Legend Box -->
  <rect x="20" y="510" width="780" height="30" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="410" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">
    Device Plugin discovers GPUs → registers with Kubelet → Kubelet advertises to API → Scheduler can schedule pods
  </text>
</svg>
